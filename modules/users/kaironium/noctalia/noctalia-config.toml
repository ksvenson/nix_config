[bar.default]
background_opacity = 0.0
center = []
end = [ "network", "volume", "battery", "clock" ]
margin_edge = 0
margin_ends = 0
position = "bottom"
radius = 0
shadow = false
start = [ "control-center", "workspaces" ]

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[idle]
behavior_order = [ "lock", "S&H" ]

    [idle.behavior."S&H"]
    action = "command"
    command = "systemctl suspend-then-hibernate"
    enabled = false
    timeout = 660

    [idle.behavior.lock]
    action = "lock"
    enabled = false
    timeout = 600

[lockscreen]
fingerprint = false

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000001" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 768.0
    cy = 848.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 112.0
    box_width = 272.0
    cx = 768.0
    cy = 480.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

[nightlight]
enabled = true

[notification]
position = "bottom_right"

[shell]
corner_radius_scale = 0.0
date_format = "%A, %b %d"
settings_show_advanced = true
show_location = false

    [shell.panel]
    open_near_click_control_center = true
    session_placement = "centered"

    [[shell.session.actions]]
    action = "command"
    command = "systemctl suspend-then-hiberate"
    enabled = true
    glyph = "player-pause"
    label = "S&H"
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "4"
    variant = "destructive"

[theme]
builtin = "Noctalia"
community_palette = "Oxocarbon"
mode = "dark"
source = "community"
wallpaper_scheme = "m3-content"

[wallpaper]
transition = [ "disc", "fade", "honeycomb", "stripes", "wipe", "zoom" ]

[weather]
enabled = false

[widget.battery]
capsule = true

[widget.clock]
format = "{:%H:%M\\n%a, %b %d}"

[widget.control-center]
glyph = "snowflake"

[widget.network]
capsule = true

[widget.volume]
capsule = true

[widget.workspaces]
hide_when_empty = true
